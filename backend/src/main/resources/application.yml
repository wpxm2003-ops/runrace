server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      # 동시 트래픽 대비 커넥션 풀 명시(기본 10). DB max_connections 한도 내에서 설정할 것.
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      # 풀 고갈 시 무한 대기 대신 빠르게 실패시켜 스레드 점유를 막는다.
      connection-timeout: 10000
      # 커넥션 누수 조기 감지(읽기 위주 경로에서 비정상 장기 점유 로깅).
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          # 승인 행 saveAll 등 다건 INSERT를 배치로 묶어 왕복 횟수를 줄인다.
          batch_size: 30
        order_inserts: true
        order_updates: true
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

logging:
  level:
    org.hibernate.SQL: warn
  pattern:
    level: "%5p [req:%X{requestId:-}]"

# 운영 헬스체크 — /actuator/health 만 공개(상세는 숨겨 정보 노출 방지). DB 상태는 자동 포함.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  aws:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    region: ap-northeast-2
    s3:
      bucket: runrace-prod-seoul-2026

runrace:
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000,http://localhost,https://localhost,https://runrace.co.kr,https://www.runrace.co.kr
  auth:
    firebase:
      enabled: true
      # Firebase Admin SDK service account json file path
      serviceAccountPath: ${FIREBASE_SERVICE_ACCOUNT_PATH:../secrets/firebase-service-account.json}
    kakao:
      rest-api-key: ${KAKAO_REST_API_KEY:}

