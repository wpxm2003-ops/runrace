server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/runrace
    username: runrace
    password: runrace
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

logging:
  level:
    org.hibernate.SQL: warn
  pattern:
    level: "%5p [req:%X{requestId:-}]"

app:
  aws:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    region: ap-northeast-2
    s3:
      bucket: runrace-prod-seoul-2026

runrace:
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000,http://localhost,https://localhost,https://runrace.co.kr,https://www.runrace.co.kr
  auth:
    firebase:
      enabled: true
      # Firebase Admin SDK service account json file path
      serviceAccountPath: ${FIREBASE_SERVICE_ACCOUNT_PATH:../secrets/firebase-service-account.json}
    kakao:
      rest-api-key: ${KAKAO_REST_API_KEY:}

