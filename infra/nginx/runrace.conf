# 기본(IP·미매칭 호스트) HTTP 서버
server {
    client_max_body_size 12M;
    listen 80 default_server;
    server_name _;
    root /var/www/runrace;
    index index.html;

    location /__/firebase/ {
        try_files $uri =404;
    }
    location /__/auth/ {
        proxy_pass https://runrace-3c8fc.firebaseapp.com/__/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host runrace-3c8fc.firebaseapp.com;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 외부 모니터링용 헬스체크만 백엔드로 프록시(다른 actuator 엔드포인트는 노출 안 함).
    location = /actuator/health {
        proxy_pass http://127.0.0.1:8081/actuator/health;
        proxy_set_header Host $host;
        access_log off;
    }

    rewrite ^/(.+)/$ /$1 permanent;

    # 동적 라우트: 숫자 id 경로를 단일 템플릿으로 매핑(정적 export id 상한 제거)
    location ~ ^/challenges/[0-9]+$ {
        try_files /challenges/view.html =404;
        add_header Cache-Control "no-cache";
    }
    location ~ ^/challenges/[0-9]+/edit$ {
        try_files /challenges/view/edit.html =404;
        add_header Cache-Control "no-cache";
    }
    location ~ ^/workouts/[0-9]+$ {
        try_files /workouts/view.html =404;
        add_header Cache-Control "no-cache";
    }
    location ~ ^/workouts/[0-9]+/share$ {
        try_files /workouts/view/share.html =404;
        add_header Cache-Control "no-cache";
    }
    location ~ ^/crew/[0-9]+$ {
        try_files /crew/view.html =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
        add_header Cache-Control "no-cache";
    }
    location /_next/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# 운영 HTTPS 서버 (Certbot 관리)
server {
    server_name www.runrace.co.kr runrace.co.kr; # managed by Certbot
    client_max_body_size 12M;
    root /var/www/runrace;
    index index.html;

    location /__/firebase/ {
        try_files $uri =404;
    }
    location /__/auth/ {
        proxy_pass https://runrace-3c8fc.firebaseapp.com/__/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host runrace-3c8fc.firebaseapp.com;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 외부 모니터링용 헬스체크만 백엔드로 프록시(다른 actuator 엔드포인트는 노출 안 함).
    location = /actuator/health {
        proxy_pass http://127.0.0.1:8081/actuator/health;
        proxy_set_header Host $host;
        access_log off;
    }

    rewrite ^/(.+)/$ /$1 permanent;

    # 동적 라우트: 숫자 id 경로를 단일 템플릿으로 매핑(정적 export id 상한 제거).
    # add_header가 있는 location은 서버 레벨 COOP를 상속 못 받으므로 COOP도 함께 재선언.
    location ~ ^/challenges/[0-9]+$ {
        try_files /challenges/view.html =404;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
        add_header Cache-Control "no-cache";
    }
    location ~ ^/challenges/[0-9]+/edit$ {
        try_files /challenges/view/edit.html =404;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
        add_header Cache-Control "no-cache";
    }
    location ~ ^/workouts/[0-9]+$ {
        try_files /workouts/view.html =404;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
        add_header Cache-Control "no-cache";
    }
    location ~ ^/workouts/[0-9]+/share$ {
        try_files /workouts/view/share.html =404;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
        add_header Cache-Control "no-cache";
    }
    location ~ ^/crew/[0-9]+$ {
        try_files /crew/view.html =404;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
        add_header Cache-Control "no-cache";
    }

    # HTML: 배포 즉시 반영(no-cache) + 팝업 로그인용 COOP를 함께 재선언.
    # (location에 add_header가 있으면 서버 레벨 add_header(COOP)를 상속하지 못하므로 반드시 같이 둔다)
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
        add_header Cache-Control "no-cache";
    }
    # 콘텐츠 해시가 박힌 정적 자산은 영구 캐시(파일명 변경 시 자동 무효화)
    location /_next/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/runrace.co.kr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/runrace.co.kr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS 리다이렉트 (Certbot 관리)
server {
    if ($host = www.runrace.co.kr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = runrace.co.kr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name www.runrace.co.kr runrace.co.kr;
    return 404; # managed by Certbot
}
