server {
    client_max_body_size 12M;

    listen 80 default_server;
    server_name _;

    root /var/www/runrace;
    index index.html;

    # Firebase redirect: init.json (파일 없으면 404 → 로그인 실패)
    location = /__/firebase/init.json {
        alias /var/www/runrace/__/firebase/init.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    location = /firebase/init.json {
        alias /var/www/runrace/__/firebase/init.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    location ^~ /__/auth/ {
        proxy_pass https://runrace-3c8fc.firebaseapp.com/__/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host runrace-3c8fc.firebaseapp.com;
    }

    location /api/ {
        client_max_body_size 12M;
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    rewrite ^/(.+)/$ /$1 permanent;

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    location /_next/ {
        try_files $uri =404;
    }
}
