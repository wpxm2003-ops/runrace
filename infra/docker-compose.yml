services:
  postgres:
    image: postgres:16
    container_name: runrace-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-runrace}
      POSTGRES_USER: ${DB_USERNAME:-runrace}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-runrace}
    ports:
      # 호스트 외부 노출 방지: 로컬호스트에만 바인딩 (앱·adminer는 같은 호스트라 OK)
      - "127.0.0.1:5432:5432"
    volumes:
      - runrace_pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: runrace-adminer
    ports:
      - "8088:8080"
    depends_on:
      - postgres

volumes:
  runrace_pgdata:

